apiVersion: v1
kind: Pod
metadata:
  name: persistent-demo
spec:
  containers:
  - name: busybox
    image: busybox
    command: ["/bin/sh","-c","while true; do echo 'Persistent Data' >> /data/file.txt; sleep 5; done"]
    volumeMounts:
    - mountPath: /data
      name: storage

  volumes:
  - name: storage
    persistentVolumeClaim:
      claimName: demo-pvc

