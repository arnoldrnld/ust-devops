apiVersion: apps/v1
kind: Deployment
metadata:
  name: myreplicaset

spec:
  replicas: 3

  selector:
    matchLabels:
      app: nginx-pod

  template:
    metadata:
      name: nginx-pod
      labels:
        app: nginx-pod

    spec:
      containers:
        - name: nginx-con
          image: nginx:1.20
          ports:
            - containerPort: 80
